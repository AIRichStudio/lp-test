<style>
:root {
  --blue:       #5B5BD6;
  --blue-lt:    #7B7EE8;
  --blue-pale:  #A5A8F0;
  --navy-dark:  #0D1340;
  --navy:       #111640;
  --bg:         #F5F7FF;
  --bg2:        #EEF1FF;
  --surface:    #ffffff;
  --text:       #0D1340;
  --body:       #3a4070;
  --muted:      #8b8fb0;
  --border:     rgba(91,91,214,0.15);
  --border2:    rgba(91,91,214,0.08);
  --accent:     #5B5BD6;
  --accent-lt:  rgba(91,91,214,0.1);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', 'DM Sans', sans-serif;
  font-weight: 400;
  overflow-x: hidden;
  line-height: 1.7;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
.cb-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.cb-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--navy-dark);
}
.cb-logo img { height: 32px; }
.cb-back {
  font-size: 13px;
  color: var(--blue);
  text-decoration: none;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: opacity 0.2s;
}
.cb-back:hover { opacity: 0.7; }
.cb-back::before {
  content: '←';
  font-size: 14px;
}

/* ── MAIN ── */
.cb-main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 28px;
}

.cb-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  box-shadow: 0 8px 40px rgba(91,91,214,0.08);
  max-width: 520px;
  width: 100%;
  padding: 48px 40px;
}

.cb-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--blue);
  background: var(--accent-lt);
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 100px;
  margin-bottom: 20px;
  letter-spacing: 0.04em;
}
.cb-badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--blue);
  flex-shrink: 0;
}

.cb-title {
  font-size: 24px;
  font-weight: 900;
  line-height: 1.4;
  color: var(--navy-dark);
  margin-bottom: 12px;
  letter-spacing: -0.01em;
}

.cb-desc {
  font-size: 14px;
  color: var(--body);
  line-height: 1.8;
  margin-bottom: 32px;
}

/* ── Thumbnail Stack ── */
.cb-thumbnails {
  margin-bottom: 28px;
}
.cb-thumb-stack {
  position: relative;
  width: 100%;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cb-thumb {
  position: absolute;
  border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  object-fit: cover;
}
.cb-thumb-back {
  width: 55%;
  left: 8%;
  transform: rotate(-4deg);
  z-index: 1;
}
.cb-thumb-front {
  width: 55%;
  right: 8%;
  transform: rotate(3deg);
  z-index: 2;
}

@media (max-width: 600px) {
  .cb-thumb-stack { height: 150px; }
  .cb-thumb-back { width: 60%; left: 4%; }
  .cb-thumb-front { width: 60%; right: 4%; }
}

/* ── HUBSPOT FORM AREA ── */
.cb-form-area {
  min-height: 300px;
}

/* HubSpot form style overrides */
.cb-form-area .hs-form-field { margin-bottom: 16px; }
.cb-form-area .hs-form-field label {
  font-size: 13px !important;
  font-weight: 500 !important;
  color: var(--navy-dark) !important;
  margin-bottom: 6px !important;
  display: block !important;
}
.cb-form-area .hs-input {
  width: 100% !important;
  height: 48px !important;
  padding: 12px 16px !important;
  border: 1px solid var(--border) !important;
  border-radius: 10px !important;
  font-size: 14px !important;
  font-family: 'Noto Sans JP', sans-serif !important;
  background: var(--bg) !important;
  color: var(--text) !important;
  transition: border-color 0.2s !important;
  box-sizing: border-box !important;
}
.cb-form-area .hs-input:focus {
  outline: none !important;
  border-color: var(--blue) !important;
  box-shadow: 0 0 0 3px rgba(91,91,214,0.12) !important;
}
.cb-form-area .hs-submit {
  margin-top: 24px;
}
.cb-form-area .hs-button {
  width: 100% !important;
  height: 52px !important;
  background: var(--blue) !important;
  color: #fff !important;
  border: none !important;
  border-radius: 12px !important;
  font-size: 15px !important;
  font-weight: 700 !important;
  font-family: 'Noto Sans JP', sans-serif !important;
  cursor: pointer !important;
  transition: background 0.2s, transform 0.2s !important;
  letter-spacing: 0.02em !important;
}
.cb-form-area .hs-button:hover {
  background: var(--blue-lt) !important;
  transform: translateY(-1px) !important;
}
.cb-form-area .hs-error-msgs {
  font-size: 12px !important;
  color: #e53e3e !important;
  margin-top: 4px !important;
}
/* Hide HubSpot branding */
.cb-form-area .hs-form .legal-consent-container { font-size: 12px !important; color: var(--muted) !important; }

/* Fallback form (shown until HubSpot loads or as placeholder) */
.cb-fallback-note {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 13px;
  border: 2px dashed var(--border);
  border-radius: 12px;
  background: var(--bg);
}
.cb-fallback-note code {
  display: block;
  margin-top: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--blue);
}

/* ── FOOTER ── */
.cb-footer {
  text-align: center;
  padding: 24px 28px;
  font-size: 12px;
  color: var(--muted);
  border-top: 1px solid var(--border2);
}
.cb-footer a {
  color: var(--blue);
  text-decoration: none;
}
.cb-footer a:hover {
  text-decoration: underline;
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .cb-card {
    padding: 36px 24px;
    border-radius: 16px;
  }
  .cb-title { font-size: 20px; }
  .cb-main { padding: 32px 16px; }
}

<script>
// HubSpotフォーム送信検知 + Meta Pixel Lead event
// hs-form-frame方式はmessageを親に送信しないため、
// iframeの高さ変化で送信完了を検知する
(function() {
  var leadFired = false;
  var formArea = document.getElementById('hubspotFormArea');
  if (!formArea) return;

  function fireLead() {
    if (leadFired) return;
    leadFired = true;
    console.log('Lead event fired!');
    if (typeof fbq === 'function') { fbq('track', 'Lead'); }
  }

  // iframeの初期高さを記録し、大幅に縮んだら送信完了と判断
  var initialHeight = 0;
  var checkCount = 0;

  setInterval(function() {
    if (leadFired) return;
    var iframe = formArea.querySelector('iframe');
    if (!iframe) return;

    var h = iframe.offsetHeight || iframe.clientHeight;
    
    // 初期高さを記録（フォームが読み込まれた後）
    if (h > 200 && initialHeight === 0) {
      initialHeight = h;
      checkCount++;
    }
    
    // 初期高さが記録され、高さが大幅に縮んだ場合 = サンクスメッセージに切り替わった
    if (initialHeight > 0 && h > 0 && h < initialHeight * 0.6 && checkCount > 0) {
      fireLead();
    }
  }, 500);
})();
</script>
